{% assign loc = include.location | strip %}
{% if loc == "n" %}
    <img style="width: 50px; top: 18px; position: relative; margin-bottom: 25px" src="{{site.baseurl}}/assets/images/netflix.svg"/>
{% elsif loc == "p" %}
    <img style="width: 50px; top: 12px; position: relative; margin-bottom: 10px"; src="{{site.baseurl}}/assets/images/prime.svg"/>
{% elsif loc == "c" %}
    <img style="width: 50px" src="{{site.baseurl}}/assets/images/cinema.svg"/>
{% elsif loc == "t" %}
    <img style="width: 50px" src="{{site.baseurl}}/assets/images/television.svg"/>
{% elsif loc == "r" %}
    <img style="width: 50px; top: 18px; position: relative; margin-bottom: 18px;" src="{{site.baseurl}}/assets/images/rakuten.svg"/>
{% elsif loc == "d" %}
    <img style="width: 50px; top: 10px; position: relative; margin-bottom: 8px;" src="{{site.baseurl}}/assets/images/disney.svg"/>
{% elsif loc == "s" %}
    <img style="width: 50px; top: 17px; position: relative; margin-bottom: 26px;" src="{{site.baseurl}}/assets/images/nowtv.svg"/>
{% elsif loc == "f" %}
    <img style="width: 25px; top: 12px; position: relative; margin-bottom: 10px;" src="{{site.baseurl}}/assets/images/flight.svg"/>
{% elsif loc == "a" %}
    <img style="width: 50px; top: 13px; position: relative; margin-bottom: 14px" src="{{site.baseurl}}/assets/images/apple.svg"/>
{% elsif loc == "b" %}
    <img style="width: 75px; top: 11px; position: relative; margin-bottom: 14px" src="{{site.baseurl}}/assets/images/bbc.svg"/>
{% endif %}
